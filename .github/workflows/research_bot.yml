name: Research Bot (Morning Scan)

on:
  schedule:
    # Research before market open: 9:00 AM EDT / 10:00 AM ADT = 13:00 UTC
    - cron: '0 13 * * 1-5'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  research-cycle:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3
        with:
          persist-credentials: true

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install Dependencies
        run: |
          cd backend
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Research
        env:
          GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
          GOOGLE_API_KEY_FALLBACK: ${{ secrets.GOOGLE_API_KEY_FALLBACK }}
          RESEARCH_GEMINI_KEY: ${{ secrets.RESEARCH_GEMINI_KEY }}
          FMP_API_KEY: ${{ secrets.FMP_API_KEY }}
          FINNHUB_KEY: ${{ secrets.FINNHUB_KEY }}
          VITE_ALPACA_API_KEY: ${{ secrets.VITE_ALPACA_API_KEY }}
          VITE_ALPACA_SECRET_KEY: ${{ secrets.VITE_ALPACA_SECRET_KEY }}
        timeout-minutes: 15
        run: |
          cd backend
          echo "Running RESEARCH..."
          python run_research.py

      - name: Sync and Push Results
        run: |
          git config --global user.name "GitHub Action Bot"
          git config --global user.email "actions@github.com"

          # Sync backend results
          cp backend/reports.json ./reports.json || true
          cp backend/reports.json frontend/public/reports.json || true

          git add backend/*.json
          git add frontend/public/*.json
          git add *.json

          git commit -m "Automated Research Sync: $(date)" || echo "No changes to commit"
          git push origin main