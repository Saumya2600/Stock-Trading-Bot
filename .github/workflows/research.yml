name: Autonomous Research Bot

on:
  schedule:
    # 9:20 AM ET (10 mins before open) - UTC Summer: 13:20
    - cron: '20 13 * * 1-5'
    # 4:10 PM ET (10 mins after close) - UTC Summer: 20:10
    - cron: '10 20 * * 1-5'
  workflow_dispatch: # Allow manual trigger

jobs:
  research:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3
        with:
          persist-credentials: true

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          cd backend
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Research Script
        env:
          VITE_ALPACA_API_KEY: ${{ secrets.VITE_ALPACA_API_KEY }}
          VITE_ALPACA_SECRET_KEY: ${{ secrets.VITE_ALPACA_SECRET_KEY }}
          GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
          GOOGLE_API_KEY_FALLBACK: ${{ secrets.GOOGLE_API_KEY_FALLBACK }}
          RESEARCH_GEMINI_KEY: ${{ secrets.RESEARCH_GEMINI_KEY }}
          fmp: ${{ secrets.FMP_API_KEY }}
          FINNHUB_KEY: ${{ secrets.FINNHUB_KEY }}
        run: |
          cd backend
          python run_research.py

      - name: Commit and Push Results
        run: |
          git config --global user.name "GitHub Action Bot"
          git config --global user.email "actions@github.com"
          git add --force backend/reports.json backend/reddit_cache.json backend/low_cache.json
          git commit -m "Automated Research Update: $(date)" || echo "No changes to commit"
          git push origin main
