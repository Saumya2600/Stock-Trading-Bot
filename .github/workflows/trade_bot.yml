name: Trading Bot (Live Execution)

on:
  schedule:
    # Market hours: 9:30 AM - 4:00 PM EDT = 13:30 - 20:00 UTC (weekdays only)
    #
    # Two entries are required because a single cron cannot express "start at :30".
    #
    # Entry 1 — covers the first half-hour of trading (13:30–13:55 UTC):
    #   Explicitly lists :30 :35 :40 :45 :50 :55 of hour 13.
    - cron: '30,35,40,45,50,55 13 * * 1-5'
    #
    # Entry 2 — covers 14:00–19:55 UTC (10:00 AM–3:55 PM EDT):
    #   Every 5 mins across hours 14–19. Stops before 20:00 (4:00 PM EDT close).
    - cron: '*/5 14-19 * * 1-5'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  trade-cycle:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3
        with:
          persist-credentials: true

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install Dependencies
        run: |
          cd backend
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Trades
        env:
          VITE_ALPACA_API_KEY: ${{ secrets.VITE_ALPACA_API_KEY }}
          VITE_ALPACA_SECRET_KEY: ${{ secrets.VITE_ALPACA_SECRET_KEY }}
        timeout-minutes: 10
        run: |
          cd backend
          echo "Running TRADING cycle..."
          # Use timeout 5m as a double-safety for Lumibot
          timeout 300 python run_trades.py || echo "Trade cycle timed out or finished"

      - name: Sync and Push App State
        run: |
          git config --global user.name "GitHub Action Bot"
          git config --global user.email "actions@github.com"

          # Sync backend app_state to root and frontend public
          cp backend/app_state.json ./app_state.json || true
          cp backend/app_state.json frontend/public/app_state.json || true

          git add backend/app_state.json
          git add frontend/public/app_state.json
          git add app_state.json

          git commit -m "Automated Trade Sync: $(date)" || echo "No changes to commit"
          git push origin main