name: Autonomous Bot (Research & Trade)

on:
  schedule:
    # --- RESEARCH START (10 AM ADT / 9 AM ET / 13:00 UTC) ---
    - cron: '0 13 * * 1-5'
    
    # --- TRADING CYCLES (Every 5 mins during market: 9:30 AM - 4:00 PM ET) ---
    # 13:30 to 20:00 UTC
    - cron: '*/5 13-20 * * 1-5'
    
  workflow_dispatch: # Allow manual trigger

permissions:
  contents: write

jobs:
  bot-cycle:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3
        with:
          persist-credentials: true

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install Dependencies
        run: |
          cd backend
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Action
        env:
          VITE_ALPACA_API_KEY: ${{ secrets.VITE_ALPACA_API_KEY }}
          VITE_ALPACA_SECRET_KEY: ${{ secrets.VITE_ALPACA_SECRET_KEY }}
          GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
          GOOGLE_API_KEY_FALLBACK: ${{ secrets.GOOGLE_API_KEY_FALLBACK }}
          RESEARCH_GEMINI_KEY: ${{ secrets.RESEARCH_GEMINI_KEY }}
          fmp: ${{ secrets.FMP_API_KEY }}
          FINNHUB_KEY: ${{ secrets.FINNHUB_KEY }}
        timeout-minutes: 10
        run: |
          cd backend
          CURRENT_HOUR=$(date +%H)
          
          # Run research 10m before open (13 UTC) or after close (20 UTC)
          if [[ "$CURRENT_HOUR" == "13" || "$CURRENT_HOUR" == "20" ]]; then
            echo "Research window detected (Hour $CURRENT_HOUR). Running RESEARCH..."
            python run_research.py
          fi
          
          echo "Running TRADING cycle..."
          # Use timeout 5m as a double-safety for Lumibot
          timeout 300 python run_trades.py || echo "Trade cycle timed out or finished"

      - name: Sync and Push Results
        run: |
          git config --global user.name "GitHub Action Bot"
          git config --global user.email "actions@github.com"
          
          # Sync backend results to root and frontend public for Vercel/GitHub pages
          cp backend/reports.json ./reports.json || true
          cp backend/app_state.json ./app_state.json || true
          cp backend/reports.json frontend/public/reports.json || true
          cp backend/app_state.json frontend/public/app_state.json || true
          
          git add backend/*.json
          git add frontend/public/*.json
          git add *.json
          
          git commit -m "Automated Bot Sync: $(date)" || echo "No changes to commit"
          git push origin main
