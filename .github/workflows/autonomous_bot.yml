name: Autonomous Bot (Research & Trade)

on:
  schedule:
    # --- RESEARCH WINDOWS ---
    # 9:20 AM ET (10 mins before open) - UTC: 13:20
    - cron: '20 13 * * 1-5'
    # 4:10 PM ET (10 mins after close) - UTC: 20:10
    - cron: '10 20 * * 1-5'
    
    # --- TRADING CYCLES (Every 5 mins during market) ---
    # 13:30 to 20:00 UTC (9:30 to 16:00 ET)
    - cron: '*/5 13-20 * * 1-5'
    
  workflow_dispatch: # Allow manual trigger

jobs:
  bot-cycle:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3
        with:
          persist-credentials: true

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          cd backend
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Action
        env:
          VITE_ALPACA_API_KEY: ${{ secrets.VITE_ALPACA_API_KEY }}
          VITE_ALPACA_SECRET_KEY: ${{ secrets.VITE_ALPACA_SECRET_KEY }}
          GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
          GOOGLE_API_KEY_FALLBACK: ${{ secrets.GOOGLE_API_KEY_FALLBACK }}
          RESEARCH_GEMINI_KEY: ${{ secrets.RESEARCH_GEMINI_KEY }}
          fmp: ${{ secrets.FMP_API_KEY }}
          FINNHUB_KEY: ${{ secrets.FINNHUB_KEY }}
        run: |
          cd backend
          # If it's a research time (20 or 10 past the hour at specific hours), run research
          # Otherwise run trading. Or just run both if needed.
          
          # Logic: If minute is 20 and hour is 13, OR minute is 10 and hour is 20 -> RESEARCH
          # Else -> TRADE
          
          CURRENT_MIN=$(date +%M)
          CURRENT_HOUR=$(date +%H)
          
          if [[ ("$CURRENT_MIN" == "20" && "$CURRENT_HOUR" == "13") || ("$CURRENT_MIN" == "10" && "$CURRENT_HOUR" == "20") ]]; then
            echo "Running DEEP RESEARCH cycle..."
            python run_research.py
          else
            echo "Running TRADING cycle..."
            python run_trades.py
          fi

      - name: Commit and Push Results
        run: |
          git config --global user.name "GitHub Action Bot"
          git config --global user.email "actions@github.com"
          git add --force backend/*.json
          git commit -m "Automated Bot Sync: $(date)" || echo "No changes to commit"
          git push origin main
